version: '3.9'

# One-command startup: docker compose up --build
# Access dashboard at http://localhost:3000
# Gateway API at http://localhost:4000
# Swagger docs at http://localhost:4000/api-docs

x-backend-env: &backend-env
  NODE_ENV: production
  LOG_PRETTY: "false"
  LOG_LEVEL: info
  DATA_DIR: /app/data
  GATEWAY_PORT: 4000
  FRAUD_SERVICE_PORT: 4001
  FRAUD_SERVICE_URL: http://fraud-service:4001
  PAYMENT_SERVICE_URL: http://payment-service:3001
  ACCOUNT_SERVICE_URL: http://account-service:3002
  VERIFICATION_SERVICE_URL: http://verification-service:3003
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "120"
  # JWT: set JWT_SECRET and REQUIRE_AUTH=true to enable token auth
  REQUIRE_AUTH: "false"

services:

  # ── API Gateway (port 4000) ──────────────────────────────────────────────────
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    ports:
      - "4000:4000"
    environment:
      <<: *backend-env
      # JWT_SECRET: change-me-in-production
    volumes:
      - gateway-data:/app/data
    depends_on:
      - fraud-service
      - payment-service
      - account-service
      - verification-service
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Fraud Detection Service (port 4001) ─────────────────────────────────────
  fraud-service:
    build:
      context: .
      dockerfile: Dockerfile.fraud
    ports:
      - "4001:4001"
    environment:
      <<: *backend-env
      FRAUD_SUSPICIOUS_THRESHOLD: "31"
      FRAUD_HIGH_RISK_THRESHOLD: "70"
      FRAUD_RAPID_FIRE_COUNT: "20"
      FRAUD_RAPID_FIRE_WINDOW_MS: "60000"
      FRAUD_PATTERN_WINDOW_MS: "300000"
      FRAUD_CREDENTIAL_STUFFING_COUNT: "5"
      FRAUD_BURST_TRANSFER_COUNT: "3"
      FRAUD_VELOCITY_SPIKE_MULTIPLIER: "3.0"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Payment Service (port 3001) ──────────────────────────────────────────────
  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.services
      args:
        SERVICE: payment
    ports:
      - "3001:3001"
    environment:
      <<: *backend-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Account Service (port 3002) ──────────────────────────────────────────────
  account-service:
    build:
      context: .
      dockerfile: Dockerfile.services
      args:
        SERVICE: account
    ports:
      - "3002:3002"
    environment:
      <<: *backend-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Verification Service (port 3003) ─────────────────────────────────────────
  verification-service:
    build:
      context: .
      dockerfile: Dockerfile.services
      args:
        SERVICE: verification
    ports:
      - "3003:3003"
    environment:
      <<: *backend-env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── React Frontend (port 3000) ───────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  gateway-data:
